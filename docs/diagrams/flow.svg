<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 380" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#17172b" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#15a34a"/>
    </marker>
  </defs>

  <rect width="1040" height="380" fill="#ffffff"/>

  <!-- forward arrows -->
  <line x1="240" y1="135" x2="415" y2="135" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="625" y1="135" x2="800" y2="135" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="327" y="116" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4338ca">SMS · missed call · DTMF</text>
  <text x="712" y="116" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4338ca">signed HTTPS</text>

  <!-- Card 1: end user -->
  <g filter="url(#sh)"><rect x="30" y="70" width="210" height="130" rx="18" fill="#ffffff" stroke="rgba(23,23,43,.10)"/></g>
  <circle cx="70" cy="108" r="18" fill="#eef0fe"/>
  <rect x="62" y="98" width="16" height="22" rx="3" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <line x1="68" y1="115" x2="72" y2="115" stroke="#4f46e5" stroke-width="2"/>
  <text x="102" y="105" font-size="15.5" font-weight="700" fill="#17172b">End user's phone</text>
  <text x="102" y="124" font-size="12.5" fill="#6b6b82">the number to verify</text>
  <text x="52" y="166" font-size="12.5" fill="#6b6b82">Sends the on-screen code</text>
  <text x="52" y="183" font-size="12.5" fill="#6b6b82">from their own number.</text>

  <!-- Card 2: receiver -->
  <g filter="url(#sh)"><rect x="415" y="70" width="210" height="130" rx="18" fill="#ffffff" stroke="rgba(23,23,43,.10)"/></g>
  <circle cx="455" cy="108" r="18" fill="#eef0fe"/>
  <rect x="447" y="97" width="16" height="23" rx="3" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="455" cy="115" r="1.6" fill="#4f46e5"/>
  <text x="487" y="105" font-size="15.5" font-weight="700" fill="#17172b">Your receiver</text>
  <text x="487" y="124" font-size="12.5" fill="#6b6b82">Android phone or Pi</text>
  <text x="437" y="166" font-size="12.5" fill="#6b6b82">Reads the sender + code,</text>
  <text x="437" y="183" font-size="12.5" fill="#6b6b82">reports it to your backend.</text>

  <!-- Card 3: backend -->
  <g filter="url(#sh)"><rect x="800" y="70" width="210" height="130" rx="18" fill="#ffffff" stroke="rgba(23,23,43,.10)"/></g>
  <circle cx="840" cy="108" r="18" fill="#eef0fe"/>
  <rect x="832" y="99" width="16" height="7" rx="2" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <rect x="832" y="110" width="16" height="7" rx="2" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <text x="872" y="105" font-size="15.5" font-weight="700" fill="#17172b">Your backend</text>
  <text x="872" y="124" font-size="12.5" fill="#6b6b82">Coordinator + SDK</text>
  <text x="822" y="166" font-size="12.5" fill="#6b6b82">Matches (number, code)</text>
  <text x="822" y="183" font-size="12.5" fill="#6b6b82">and marks it verified.</text>

  <!-- return path: verified pushed back to the UI -->
  <path d="M905 200 C 905 300, 905 322, 740 322 L 300 322 C 135 322, 135 300, 135 206"
        fill="none" stroke="#15a34a" stroke-width="2.4" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arrowG)"/>
  <text x="520" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#15a34a">&#10003;  "verified" pushed back to your app — the verified number is the sender</text>
</svg>
