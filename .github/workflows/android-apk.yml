name: Android APK

# Builds the receiver APK and attaches it to the GitHub Release when a tag is
# pushed (so downloads stay in sync with the source). Also runnable on demand
# from the Actions tab, which uploads the APK as a workflow artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # upload release assets

jobs:
  apk:
    name: Build receiver APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receiver-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Build signed release APK
        env:
          CTV_KEYSTORE_FILE: ${{ runner.temp }}/ctv.keystore
          CTV_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'calltoverify' }}
          CTV_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'ctv' }}
          CTV_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'calltoverify' }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$CTV_KEYSTORE_FILE"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — using an ephemeral keystore. The APK is non-debuggable and installable, but the signing key rotates each build (no in-place upgrades). Add the secret for a stable signing key."
            keytool -genkeypair -keystore "$CTV_KEYSTORE_FILE" \
              -storepass "$CTV_KEYSTORE_PASSWORD" -keypass "$CTV_KEY_PASSWORD" \
              -alias "$CTV_KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=CallToVerify Receiver, O=CallToVerify"
          fi
          ./gradlew :app:assembleRelease --no-daemon
      - name: Name it
        run: cp app/build/outputs/apk/release/app-release.apk calltoverify-receiver.apk
      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: calltoverify-receiver-apk
          path: receiver-android/calltoverify-receiver.apk
      - name: Attach to the release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" calltoverify-receiver.apk --clobber \
            || gh release create "$GITHUB_REF_NAME" calltoverify-receiver.apk \
                 --title "$GITHUB_REF_NAME" --notes "CallToVerify Android receiver APK."
