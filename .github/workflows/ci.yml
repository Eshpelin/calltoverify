name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coordinator:
    name: Coordinator (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coordinator
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ctv
          POSTGRES_PASSWORD: ctv
          POSTGRES_DB: ctv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ctv -d ctv_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CTV_TEST_DATABASE_URL: postgres://ctv:ctv@localhost:5432/ctv_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: coordinator/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && echo 'run gofmt' && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  sdk-node:
    name: Node SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-server-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk-server-node/package-lock.json
      - run: npm ci
      - run: npm test
