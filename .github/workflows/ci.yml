name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coordinator:
    name: Coordinator (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coordinator
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ctv
          POSTGRES_PASSWORD: ctv
          POSTGRES_DB: ctv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ctv -d ctv_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CTV_TEST_DATABASE_URL: postgres://ctv:ctv@localhost:5432/ctv_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: coordinator/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && echo 'run gofmt' && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  sdk-node:
    name: Node SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-server-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk-server-node/package-lock.json
      - run: npm ci
      - run: npm test

  widget-web:
    name: Web widget
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: widget-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: widget-web/package-lock.json
      - run: npm ci
      - run: npm test

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-server-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m unittest discover -s tests -t .

  sdk-php:
    name: PHP SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-server-php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json
      - run: composer install --no-interaction --no-progress
      - run: composer test

  sdk-react:
    name: React SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-client-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk-client-react/package-lock.json
      - run: npm ci
      - run: npm test

  receiver-pi:
    name: Pi receiver (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receiver-pi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m unittest discover -s tests -t .

  sdk-flutter:
    name: Flutter SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-client-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
