# Project-wide Gradle settings.

# Use the AndroidX support libraries (required by all modern Android deps).
android.useAndroidX=true

# Run Gradle in a JVM with a generous heap; Android builds are memory hungry.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Build only the variants actually requested, and cache/parallelize where safe.
org.gradle.caching=true
org.gradle.parallel=true

# Kotlin compiles to JVM bytecode using the official Kotlin code style.
kotlin.code.style=official

# Generate per-variant R classes (smaller, faster, the modern default).
android.nonTransitiveRClass=true
